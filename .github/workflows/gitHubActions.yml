# This workflow will build a Java project with Maven, and cache/restore any dependencies to improve the workflow execution time
# For more information see: https://docs.github.com/en/actions/automating-builds-and-tests/building-and-testing-java-with-maven

# This workflow uses actions that are not certified by GitHub.
# They are provided by a third-party and are governed by
# separate terms of service, privacy policy, and support
# documentation.

name: Qase Framework CI & Allure Report

# Триггеры запуска пайплайна
on:
  push:
    branches: [ "master", "main" ]
  pull_request:
    branches: [ "master", "main" ]
  # Сохраняем возможность ручного запуска любого сьюта по кнопке
  workflow_dispatch:
    inputs:
      test_suite:
        description: 'Выберите тест-сьют для запуска:'
        required: true
        default: 'api-smoke'
        type: choice
        options:
          - 'api-smoke'
          - 'ui-smoke'
          - 'api-regression'
          - 'ui-regression'
          - 'tests'

jobs:
  run-tests:
    name: Execute Tests & Publish Report
    runs-on: ubuntu-latest

    env:
      QASE_TOKEN: ${{ secrets.QASE_API_TOKEN }}
      USER_EMAIL: ${{ secrets.QASE_USER_EMAIL }}
      USER_PASSWORD: ${{ secrets.QASE_USER_PASSWORD }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: maven

      # Динамически определяем имя сьюта:
      # Если это push/PR — берем дефолтный 'api-smoke'. Если ручной запуск — берем то, что выбрал юзер.
      - name: Determine Test Suite Name
        id: target-suite
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            echo "suite_name=${{ inputs.test_suite }}" >> $GITHUB_OUTPUT
          else
            echo "suite_name=api-smoke" >> $GITHUB_OUTPUT
          fi

      # Инициализируем Ollama, только если запускается API сьют или All-Tests
      - name: Install and Start Ollama Engine (API & All)
        if: contains(steps.target-suite.outputs.suite_name, 'api') || steps.target-suite.outputs.suite_name == 'all-tests'
        run: |
          curl -fsSL https://ollama.com | sh
          nohup ollama serve > ollama.log 2>&1 &
          echo "Waiting for Ollama engine to wake up..."
          sleep 10
          echo "Pulling Qwen-Coder micro model..."
          ollama pull qwen2.5-coder:1.5b

      # Запуск тестов через Maven с подстановкой вычисленного XML-файла
      - name: Run Automation Tests
        run: |
          echo "Запускается сьют: src/test/resources/${{ steps.target-suite.outputs.suite_name }}-suite.xml"
          mvn clean test -DsuiteXmlFile=src/test/resources/${{ steps.target-suite.outputs.suite_name }}-suite.xml -Dtoken=$QASE_TOKEN -Duser=$USER_EMAIL -Dpassword=$USER_PASSWORD
        continue-on-error: true

      # Вытягиваем ветку gh-pages для сохранения трендов и истории в Allure
      - name: Get Allure history
        uses: actions/checkout@v4
        if: always()
        continue-on-error: true
        with:
          ref: gh-pages
          path: gh-pages

      # Собираем интерактивный Allure Report
      - name: Generate Allure Report
        uses: simple-elf/allure-report-action@master
        if: always()
        with:
          allure_results: target/allure-results
          allure_history: allure-history
          keep_reports: 20

      # Публикуем сгенерированный Allure-отчет на статический сайт GitHub Pages
      - name: Deploy Allure Report to GitHub Pages
        if: always()
        uses: peaceiris/actions-gh-pages@v3
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_branch: gh-pages
          publish_dir: allure-history